<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuigyokuP - 大崎甘奈</title>
<style>
    /* ================================== */
    /*          网页整体星空背景设计         */
    /* ================================== */
    body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        /* 为了配合甘奈，外层星空加了一点点紫粉色的色调 */
        background: radial-gradient(ellipse at bottom, #301f35 0%, #0d0f1a 100%);
    }

    .starry-background {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: -2;
        pointer-events: none; 
        background-image: 
            radial-gradient(1.5px 1.5px at 20px 30px, #fff, transparent),
            radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.8), transparent),
            radial-gradient(2px 2px at 50px 160px, rgba(255,255,255,0.9), transparent),
            radial-gradient(1.5px 1.5px at 90px 40px, #fff, transparent),
            radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.7), transparent),
            radial-gradient(1px 1px at 160px 120px, #fff, transparent),
            radial-gradient(2.5px 2.5px at 200px 150px, rgba(255,255,255,0.6), transparent),
            radial-gradient(1px 1px at 250px 50px, #fff, transparent),
            radial-gradient(1.5px 1.5px at 300px 180px, #fff, transparent),
            radial-gradient(2px 2px at 350px 90px, rgba(255,255,255,0.8), transparent),
            radial-gradient(1px 1px at 400px 220px, #fff, transparent);
        background-repeat: repeat;
        background-size: 350px 350px;
        animation: twinkle 5s infinite alternate;
    }

    @keyframes twinkle {
        0% { opacity: 0.3; }
        100% { opacity: 1; }
    }

    .mountains {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 30vh;
        z-index: -1;
        pointer-events: none;
        background-image: 
            radial-gradient(ellipse 150% 100% at 30% 100%, #0a0507 40%, transparent 41%),
            radial-gradient(ellipse 180% 120% at 80% 100%, #0a0507 45%, transparent 46%),
            radial-gradient(ellipse 200% 100% at 50% 100%, #120910 35%, transparent 36%),
            radial-gradient(ellipse 150% 90% at 10% 100%, #120910 40%, transparent 41%),
            radial-gradient(ellipse 250% 80% at 70% 100%, #1a1018 30%, transparent 31%);
        background-position: bottom;
        background-repeat: no-repeat;
    }

    /* 音乐按钮 */
    .music-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 45px;
        height: 45px;
        background-color: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 22px;
        color: white;
        cursor: pointer;
        z-index: 100;
        backdrop-filter: blur(5px);
        transition: all 0.3s ease;
    }
    .music-btn.playing {
        background-color: rgba(245, 66, 117, 0.9); 
        box-shadow: 0 0 15px rgba(245, 66, 117, 0.6);
        animation: spin 4s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* ================================== */
    /*          核心卡片容器                */
    /* ================================== */
    .card-wrapper {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        cursor: grab;
        perspective: 1000px;
        width: 350px;
        height: 200px;
        user-select: none;
        z-index: 10;
        touch-action: none;
    }
    .card-wrapper:active { cursor: grabbing; }
    .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1);
        transform-style: preserve-3d;
        border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    }
    .card-inner.is-flipped { transform: rotateY(180deg); }
    .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        border-radius: 15px;
        overflow: hidden;
    }

    /* ================================== */
    /*      名片正面 (ALSTROEMERIA 风格)    */
    /* ================================== */
    .card-front {
        /* 柔和的粉白渐变底色 */
        background: linear-gradient(135deg, #FFEdf2 0%, #FFC1D5 100%);
    }
    
    /* 纯 CSS 画的装饰性“散落花瓣” */
    .floral-deco {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        pointer-events: none;
        z-index: 1;
        background-image: 
            radial-gradient(circle at 10% 20%, rgba(255,255,255,0.6) 2px, transparent 3px),
            radial-gradient(circle at 30% 80%, rgba(255,255,255,0.5) 4px, transparent 5px),
            radial-gradient(circle at 80% 10%, rgba(255,255,255,0.7) 3px, transparent 4px),
            radial-gradient(circle at 90% 90%, rgba(255,255,255,0.4) 5px, transparent 6px);
    }

    /* 甘奈人物立绘 - 放大并放在右侧 */
    .front-character {
        position: absolute;
        bottom: -5%; /* 稍微下沉一点 */
        right: -10%; /* 偏右侧放置 */
        width: 65%; /* 占比例大一点 */
        height: 110%;
        background-image: url('SCAmana.png'); 
        background-size: contain;
        background-position: bottom right;
        background-repeat: no-repeat;
        z-index: 2;
        /* 柔和的阴影 */
        filter: drop-shadow(-3px 5px 5px rgba(245, 66, 117, 0.3));
    }

    /* 左侧的信息浮窗 (类似手账贴纸的感觉) */
    .front-info-panel {
        position: absolute;
        top: 10%;
        left: 5%;
        width: 55%;
        height: 80%;
        background: rgba(255, 255, 255, 0.85); /* 半透明白底 */
        backdrop-filter: blur(4px);
        border-radius: 12px;
        padding: 15px;
        box-sizing: border-box;
        z-index: 3;
        display: flex;
        flex-direction: column;
        justify-content: center;
        /* 增加粉色细边框 */
        border: 1px solid rgba(245, 66, 117, 0.2);
        box-shadow: 2px 2px 10px rgba(0,0,0,0.05);
    }

    .name-section h2 { 
        margin: 0 0 5px 0; 
        font-size: 22px; 
        /* 名字颜色改为了较深的粉紫色 */
        color: #d81b60; 
        font-weight: 900; 
        letter-spacing: 0.5px;
    }
    .name-section p { 
        margin: 2px 0; 
        font-size: 9px; 
        color: #888; 
        font-weight: bold; 
    }
    
    .socials { 
        margin-top: 12px;
        font-size: 9px; 
        color: #555; 
        line-height: 1.6; 
    }
    .socials div { display: flex; align-items: center; gap: 5px; }
    /* 小图标颜色 */
    .socials span { font-weight: bold; color: #F54275; }

    .nfc-section {
        position: absolute;
        bottom: 10px;
        right: 15px;
        font-size: 8px;
        color: #aaa;
        display: flex;
        align-items: center;
        gap: 5px;
        font-weight: bold;
        animation: breathing 2.5s infinite;
        z-index: 4; /* 确保在人物上层 */
    }
    @keyframes breathing {
        0% { opacity: 0.5; }
        50% { opacity: 1; transform: scale(1.02); }
        100% { opacity: 0.5; }
    }
    .nfc-icon { color: #F54275; font-size: 12px; }

    /* ================================== */
    /*          名片背面样式                */
    /* ================================== */
    .card-back {
        transform: rotateY(180deg);
        display: flex;
        flex-direction: column;
        background-color: white;
    }
    
    /* 283 Logo 终于放在背面了，放在左上角 */
    .back-logo {
        position: absolute;
        top: 15px;
        left: 15px; /* 改到了左上角 */
        width: 60px; /* 稍微放大一点 */
        height: auto;
        opacity: 0.8; 
        z-index: 5;
    }
    
    .back-top { 
        padding: 15px; 
        padding-left: 85px; /* 给左侧的 Logo 留出空间 */
        height: 44%; 
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }
    .back-top p { margin: 2px 0; font-size: 9px; color: #555; font-weight: bold; }
    
    .back-bottom {
        height: 56%; 
        /* 纯正的 ALSTROEMERIA 粉色 */
        background-color: #F54275;
        color: white;
        background-image: 
            repeating-linear-gradient(
                -45deg,
                rgba(255, 255, 255, 0.05),
                rgba(255, 255, 255, 0.05) 3px,
                transparent 3px,
                transparent 8px
            ),
            radial-gradient(circle at bottom right, #c2185b, transparent 80%);
            
        display: flex;
        flex-direction: column;
        justify-content: center;
        /* 背面大字改回右对齐，显得更特别 */
        align-items: flex-end; 
        padding-right: 20px;
        font-family: 'Arial Black', Impact, sans-serif;
        font-size: 40px;
        font-weight: 900;
        font-style: italic;
        line-height: 0.85;
        letter-spacing: -1px;
        /* 白字加上淡粉色的阴影，更梦幻 */
        text-shadow: 4px 4px 0px rgba(0,0,0,0.15);
    }
</style>
</head>
<body>

<div class="starry-background"></div>
<div class="mountains"></div>

<audio id="bgMusic" loop>
    <source src="bgm.mp3" type="audio/mpeg">
</audio>
<div id="musicToggle" class="music-btn" title="播放/暂停音乐">🔇</div>

<div class="card-wrapper" id="draggableCard">
    <div class="card-inner" id="cardInner">
        
        <!-- 名片正面：花组风格全新设计 -->
        <div class="card-face card-front">
            <!-- 背景花瓣装饰 -->
            <div class="floral-deco"></div>
            <!-- 甘奈立绘 -->
            <div class="front-character"></div>
            
            <!-- 左侧手账风信息面板 -->
            <div class="front-info-panel">
                <div class="name-section">
                    <h2>SuigyokuP</h2>
                    <p>283プロデューサー科</p>
                    <p>大崎甘奈担当プロデューサー</p>
                </div>
                
                <div class="socials">
                    <div><span>@:</span> Rain Grain</div>
                    <div><span>✉:</span> 1635786118@QQ.com</div>
                    <div><span>B:</span> space.bilibili.com/488509701</div>
                </div>
            </div>

            <div class="nfc-section">
                TAP TO START <span class="nfc-icon">N))</span>
            </div>
        </div>

        <!-- 名片背面 -->
        <div class="card-face card-back">
            <!-- 283 Logo 显示在左上角！ -->
            <img src="900px-283Pro_Logo.png" class="back-logo" alt="283 Pro Logo" onerror="this.style.display='none'; alert('没找到Logo图片，请检查文件名是否完全一致！');">
            
            <div class="back-top">
                <p>283 PRODUCTION</p>
                <p>OSAKI AMANA</p>
                <p>AGE 17</p>
                <p style="margin-top: 15px; color:#d81b60;">笑顔の花を咲かせましょう！</p>
            </div>
            <div class="back-bottom">
                PRODUCER<br>CARD
            </div>
        </div>
        
    </div>
</div>

<script>
    const musicToggle = document.getElementById('musicToggle');
    const bgMusic = document.getElementById('bgMusic');
    let isPlaying = false;

    musicToggle.addEventListener('click', (e) => {
        e.stopPropagation(); 
        if (isPlaying) {
            bgMusic.pause();
            musicToggle.classList.remove('playing');
            musicToggle.innerHTML = '🔇';
        } else {
            let playPromise = bgMusic.play();
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    musicToggle.classList.add('playing');
                    musicToggle.innerHTML = '🎵';
                }).catch(error => {
                    console.log("Play failed: ", error);
                });
            }
        }
        isPlaying = !isPlaying;
    });

    const dragItem = document.getElementById('draggableCard');
    const cardInner = document.getElementById('cardInner');
    
    let active = false;
    let currentX;
    let currentY;
    let initialX;
    let initialY;
    let xOffset = -175; 
    let yOffset = -100;
    let clickStartTime;

    function dragStart(e) {
        if (e.type === "touchstart") {
            initialX = e.touches[0].clientX - xOffset;
            initialY = e.touches[0].clientY - yOffset;
        } else {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
        }

        if (e.target === dragItem || dragItem.contains(e.target)) {
            active = true;
            clickStartTime = Date.now();
            dragItem.style.transition = 'none';
            document.body.style.cursor = 'grabbing';
        }
    }

    function dragEnd(e) {
        if (!active) return;
        
        initialX = currentX;
        initialY = currentY;
        active = false;
        dragItem.style.transition = '';
        document.body.style.cursor = 'default';

        if (Date.now() - clickStartTime < 200) {
            cardInner.classList.toggle('is-flipped');
        }
    }

    function drag(e) {
        if (active) {
            e.preventDefault(); 
        
            if (e.type === "touchmove") {
                currentX = e.touches[0].clientX - initialX;
                currentY = e.touches[0].clientY - initialY;
            } else {
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
            }

            xOffset = currentX;
            yOffset = currentY;
            setTranslate(currentX, currentY, dragItem);
        }
    }

    function setTranslate(xPos, yPos, el) {
        el.style.transform = `translate(${xPos}px, ${yPos}px)`;
    }

    document.addEventListener("touchstart", dragStart, { passive: false });
    document.addEventListener("touchend", dragEnd, false);
    document.addEventListener("touchmove", drag, { passive: false });

    document.addEventListener("mousedown", dragStart, false);
    document.addEventListener("mouseup", dragEnd, false);
    document.addEventListener("mousemove", drag, false);

</script>

</body>
</html>
